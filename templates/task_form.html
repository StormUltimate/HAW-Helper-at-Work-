{% extends "base.html" %}

{% if task %}
  {% set page_title = "Редактировать задачу" %}
{% else %}
  {% set page_title = "Новая задача" %}
{% endif %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
  <div class="pagehead">
    <h1>{{ page_title }}</h1>
  </div>

  <form class="form" method="post" action="{% if task %}{{ url_for('task_update', task_id=task.id) }}{% else %}{{ url_for('task_create') }}{% endif %}">
    <label class="field">
      <div class="field__label">Название</div>
      <input name="title" value="{{ (task.title if task else '') }}" maxlength="200" required />
    </label>

    <label class="field">
      <div class="field__label">Описание (опционально)</div>
      <textarea name="description" rows="5">{{ (task.description if task else '') }}</textarea>
    </label>

    <label class="field">
      <div class="field__label">Статус</div>
      {% set st = (task.status if task else 'planned') %}
      <select name="status">
        <option value="planned" {% if st == 'planned' %}selected{% endif %}>Запланировано</option>
        <option value="in_progress" {% if st == 'in_progress' %}selected{% endif %}>В работе</option>
        <option value="done" {% if st == 'done' %}selected{% endif %}>Сделано</option>
        <option value="blocked" {% if st == 'blocked' %}selected{% endif %}>Заблокировано</option>
      </select>
    </label>

    <label class="field">
      <div class="field__label">Срок (дата, опционально)</div>
      <input type="date" name="due_date" value="{% if task and task.due_date %}{{ task.due_date.isoformat() }}{% endif %}" />
    </label>

    <label class="field">
      <div class="field__label">Приоритет (квадрант Эйзенхауэра)</div>
      {% set q = (task.quadrant if task else 2) %}
      <select name="quadrant">
        <option value="1" {% if q == 1 %}selected{% endif %}>Q1 — Срочно и важно</option>
        <option value="2" {% if q == 2 %}selected{% endif %}>Q2 — Не срочно, но важно</option>
        <option value="3" {% if q == 3 %}selected{% endif %}>Q3 — Срочно, но не важно</option>
        <option value="4" {% if q == 4 %}selected{% endif %}>Q4 — Не срочно и не важно</option>
      </select>
    </label>

    <div class="row">
      <button class="btn btn--primary" type="submit">Сохранить</button>
      <a class="btn btn--ghost" href="{% if task %}{{ url_for('task_view', task_id=task.id) }}{% else %}{{ url_for('index') }}{% endif %}">Отмена</a>
    </div>
  </form>
{% endblock %}
